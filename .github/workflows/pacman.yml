name: Generate Pacman Animation

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Generate Pacman
        uses: Platane/snk@v3
        with:
          github_user_name: aomta
          outputs: |
            dist/pacman.svg?palette=github-dark

      - name: Push SVG
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
